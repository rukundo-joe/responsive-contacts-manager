<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tests — Responsive Contact Manager</title>
  <style>
    body { font: 15px/1.5 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #14201b; }
    h1 { font-size: 1.4rem; }
    .summary { font-weight: 700; padding: .75rem 1rem; border-radius: 10px; margin: 1rem 0; }
    .summary.pass { background: #e3f3ec; color: #155c44; }
    .summary.fail { background: #fbe9e7; color: #c0392b; }
    ul { list-style: none; padding: 0; }
    li { padding: .35rem .5rem; border-bottom: 1px solid #eee; display: flex; gap: .5rem; }
    .ok { color: #1f7a5c; } .bad { color: #c0392b; }
    .msg { color: #c0392b; font-size: .85rem; }
  </style>
</head>
<body>
  <h1>Responsive Contact Manager — browser tests</h1>
  <p>Runs the same suite as <code>node tests/test.js</code>, plus a live localStorage round-trip.</p>
  <div id="summary" class="summary">Running…</div>
  <ul id="results"></ul>

  <script type="module">
    import { registerTests } from './suite.js';
    import { createStore } from '../scripts/state.js';

    const results = document.getElementById('results');
    let passed = 0, failed = 0;

    const assert = {
      ok(c, m = 'expected truthy') { if (!c) throw new Error(m); },
      equal(a, b, m) { if (a !== b) throw new Error(m || `expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); },
      deepEqual(a, b, m) { if (JSON.stringify(a) !== JSON.stringify(b)) throw new Error(m || `expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); },
      throws(fn, m) { try { fn(); } catch { return; } throw new Error(m || 'expected throw'); },
    };

    function test(name, fn) {
      const li = document.createElement('li');
      try {
        fn(); passed++;
        li.innerHTML = `<span class="ok">✓</span><span>${name}</span>`;
      } catch (e) {
        failed++;
        li.innerHTML = `<span class="bad">✗</span><span>${name}<br><span class="msg">${e.message}</span></span>`;
      }
      results.appendChild(li);
    }

    registerTests(test, assert);

    // Browser-only: localStorage-backed store persists a contact.
    test('[browser] store persists add across reload', () => {
      localStorage.removeItem('rcm:contacts:v1');
      const s1 = createStore();
      s1.add({ name: 'Persist Me', email: 'p@x.com', phone: '', website: '', tags: [] });
      const s2 = createStore(); // re-reads from localStorage
      assert.equal(s2.getView().total, 1);
      assert.equal(s2.getView().contacts[0].name, 'Persist Me');
      localStorage.removeItem('rcm:contacts:v1');
    });

    const summary = document.getElementById('summary');
    summary.textContent = `${passed} passed, ${failed} failed (${passed + failed} total)`;
    summary.className = 'summary ' + (failed ? 'fail' : 'pass');
  </script>
</body>
</html>
